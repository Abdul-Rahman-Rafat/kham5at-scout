<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>Kham5at Scout</title>
  </head>
  <body>
    <span id="resetAll">Reset All</span>
    <div class="wrap">
      <h1 class="title_5">طلبات الخدمات غير الموجودة</h1>

      <label for="loadMore">كام مرة تعمل Load More؟</label>
      <input type="number" id="loadMore" value="5" min="0" max="30" />

      <div class="keywords-header">
        <label for="keywords">كلمات مفتاحية (كل كلمة في سطر)</label>
        <button id="clearKeywords">مسح الكلمات</button>
      </div>
      <textarea
        id="keywords"
        placeholder="مثال:
frontend
واجهة
موقع
تطبيق ويب
تصميم موقع"
      ></textarea>

      <button id="run">دور على أحدث الطلبات</button>
      <div id="status"></div>
      <div id="searchForm" style="display: none">
        <label for="search">ابحث في النتائج</label>
        <input type="text" id="search" placeholder="اكتب كلمة للبحث..." />
      </div>
      <div id="results"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
